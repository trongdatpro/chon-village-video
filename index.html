<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chồn Village Gatekeeper UI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Cinzel:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c8a96a",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1e1b14",
                        "ivory": "#FFFFF5",
                        "graphite": "#1A1A1A"
                    },
                    fontFamily: {
                        "display": ["Playfair Display", "Noto Serif", "serif"],
                        "header": ["Cinzel", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .rococo-border {
            border: 2px solid #c8a96a;
            position: relative;
            padding: 2px;
        }

        .rococo-border::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid #c8a96a;
            pointer-events: none;
        }

        .corner-leaf {
            position: absolute;
            width: 40px;
            height: 40px;
            color: #c8a96a;
            z-index: 10;
        }

        body {
            min-height: max(884px, 100dvh);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-6px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(6px);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1.05);
            }
        }

        .animate-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        .animate-pop {
            animation: pop 0.25s ease-out both;
        }

        #booking-warning {
            opacity: 1;
            transition: all 0.3s ease;
            color: #8B4513 !important;
            /* Default brown color */
        }

        #booking-warning.active {
            color: #ef4444 !important;
            /* Error red */
            font-weight: 800;
            transform: scale(1.05);
        }
    </style>
</head>

<body class="bg-[#1a1a1a] font-display text-graphite">

    <!-- Script to handle floating contact toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('floating-contact-container');
            const toggleBtn = document.getElementById('contact-toggle-btn');
            const slidePanel = document.getElementById('contact-icons-slide');

            let isOpen = false;

            const toggleContactMenu = (e) => {
                if (e) {
                    e.stopPropagation();
                }
                isOpen = !isOpen;
                if (isOpen) {
                    slidePanel.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                    slidePanel.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
                } else {
                    slidePanel.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
                    slidePanel.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                }
            };

            if (toggleBtn) {
                toggleBtn.addEventListener('click', toggleContactMenu);
            }

            document.addEventListener('click', (event) => {
                if (isOpen && container && !container.contains(event.target)) {
                    toggleContactMenu();
                }
            });
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const checkinInput = document.getElementById('checkin-date');
                const checkoutInput = document.getElementById('checkout-date');
                const bookingWarning = document.getElementById('booking-warning');

                const clearWarning = () => {
                    if (bookingWarning) bookingWarning.classList.remove('active');
                };

                // --- V5.1 Sync State Support ---
                const bookingDataStr = sessionStorage.getItem('chonVillageBooking');
                let initialBookingData = null;
                try {
                    initialBookingData = bookingDataStr ? JSON.parse(bookingDataStr) : null;
                } catch (e) {
                    console.error("Session storage parse failed", e);
                }

                // Setup dates constraint (min today)
                const todayStr = new Date().toISOString().split('T')[0];
                if (checkinInput) checkinInput.min = todayStr;

                if (initialBookingData) {
                    if (initialBookingData.checkin && checkinInput) checkinInput.value = initialBookingData.checkin;
                    if (initialBookingData.checkout && checkoutInput) {
                        checkoutInput.value = initialBookingData.checkout;
                        const ciDate = initialBookingData.checkin ? new Date(initialBookingData.checkin) : null;
                        if (ciDate && !isNaN(ciDate.getTime())) {
                            const nextDay = new Date(ciDate);
                            nextDay.setDate(nextDay.getDate() + 1);
                            checkoutInput.min = nextDay.toISOString().split('T')[0];
                        }
                    }
                    if (initialBookingData.phone) {
                        const phoneInput = document.getElementById('contact-info');
                        if (phoneInput) phoneInput.value = initialBookingData.phone;
                    }
                }

                if (checkinInput) {
                    checkinInput.addEventListener('change', () => {
                        clearWarning();
                        // Automatically set checkout to +2 days after checkin
                        if (checkinInput.value && checkoutInput) {
                            const checkinDate = new Date(checkinInput.value);

                            // Set min checkout to +1 day
                            const minDate = new Date(checkinDate);
                            minDate.setDate(minDate.getDate() + 1);
                            checkoutInput.min = minDate.toISOString().split('T')[0];

                            // Set default value to +2 days
                            const defaultCheckout = new Date(checkinDate);
                            defaultCheckout.setDate(defaultCheckout.getDate() + 2);
                            checkoutInput.value = defaultCheckout.toISOString().split('T')[0];
                        }
                    });
                }

                // Setup Guest Counters
                const minusAdult = document.getElementById('minus-adult');
                const plusAdult = document.getElementById('plus-adult');
                const adultCountSpan = document.getElementById('adult-count');
                const minusChild = document.getElementById('minus-child');
                const plusChild = document.getElementById('plus-child');
                const childCountSpan = document.getElementById('child-count');
                const ageContainer = document.getElementById('children-ages-container');

                function updateChildAgesUI() {
                    if (!ageContainer) return;
                    const currentCount = ageContainer.children.length;
                    if (childCount > currentCount) {
                        for (let i = currentCount; i < childCount; i++) {
                            const select = document.createElement('select');
                            select.className = "child-age-selector text-[10px] text-primary bg-transparent border-none py-0 pl-0 pr-5 focus:ring-0 uppercase cursor-pointer";
                            select.innerHTML = `
                                <option value="" disabled selected hidden>Trẻ ${i + 1}: độ tuổi</option>
                                ${Array.from({ length: 12 }, (_, j) => `<option value="${j + 1}">${j + 1} tuổi</option>`).join('')}
                            `;
                            ageContainer.appendChild(select);
                        }
                    } else if (childCount < currentCount) {
                        for (let i = currentCount; i > childCount; i--) {
                            ageContainer.removeChild(ageContainer.lastChild);
                        }
                    }
                }

                let adultCount = initialBookingData ? (parseInt(initialBookingData.adults) || 2) : 2;
                let childCount = initialBookingData ? (parseInt(initialBookingData.children) || 0) : 0;

                // Initial UI sync
                if (adultCountSpan) adultCountSpan.textContent = adultCount;
                if (childCountSpan) childCountSpan.textContent = childCount;
                updateChildAgesUI();

                if (initialBookingData && initialBookingData.childrenAgeCategory && ageContainer) {
                    const initialAges = initialBookingData.childrenAgeCategory.split(',').filter(a => a);
                    const ageSelectors = ageContainer.querySelectorAll('.child-age-selector');
                    initialAges.forEach((age, idx) => {
                        if (ageSelectors[idx]) ageSelectors[idx].value = age;
                    });
                }

                if (minusAdult) {
                    minusAdult.addEventListener('click', () => {
                        if (adultCount > 1) {
                            adultCount--;
                            if (adultCountSpan) adultCountSpan.textContent = adultCount;
                        }
                    });
                }

                if (plusAdult) {
                    plusAdult.addEventListener('click', () => {
                        adultCount++;
                        if (adultCountSpan) adultCountSpan.textContent = adultCount;
                    });
                }

                let isCheckingPolicy = false;

                if (minusChild) {
                    minusChild.addEventListener('click', () => {
                        clearWarning();
                        if (childCount > 0) {
                            childCount--;
                            if (childCountSpan) childCountSpan.textContent = childCount;
                            updateChildAgesUI();
                        }
                    });
                }

                if (plusChild) {
                    plusChild.addEventListener('click', () => {
                        clearWarning();
                        childCount++;
                        if (childCountSpan) childCountSpan.textContent = childCount;
                        updateChildAgesUI();
                    });
                }

                const submitBtn = document.getElementById('submit-booking');
                const submitText = document.getElementById('submit-text');

                const POLICY_API = "https://docs.google.com/spreadsheets/d/1jszKQ6uZOqk-MD0vy--9NqISDuUDau6-gyx-KO1wck4/gviz/tq?gid=1382126270";

                const fetchJSONP = (url) => new Promise((resolve) => {
                    const cbName = 'gvizCb_' + Date.now() + Math.floor(Math.random() * 10000);
                    const s = document.createElement('script');
                    const timeout = setTimeout(() => {
                        delete window[cbName];
                        if (s.parentNode) document.head.removeChild(s);
                        resolve(null);
                    }, 10000); // 10s timeout
                    window[cbName] = (res) => {
                        clearTimeout(timeout);
                        delete window[cbName];
                        if (s.parentNode) document.head.removeChild(s);
                        resolve(res);
                    };
                    s.src = url + (url.includes('?') ? '&' : '?') + 'tqx=out:json;responseHandler:' + cbName;
                    document.head.appendChild(s);
                });


                const triggerWarningEffect = () => {
                    if (!bookingWarning) return;
                    bookingWarning.classList.add('active');
                    bookingWarning.style.animation = 'none';
                    void bookingWarning.offsetWidth;
                    bookingWarning.style.animation = '';
                    bookingWarning.classList.remove('animate-shake', 'animate-pop');
                    void bookingWarning.offsetWidth;
                    bookingWarning.classList.add('animate-shake', 'animate-pop');
                };

                const form = document.querySelector('form');
                if (form) {
                    form.addEventListener('submit', async (e) => {
                        e.preventDefault();

                        const checkinVal = checkinInput ? checkinInput.value : '';
                        const checkoutVal = checkoutInput ? checkoutInput.value : '';
                        const contactEl = document.getElementById('contact-info');
                        const phoneVal = contactEl ? contactEl.value : '';
                        const ageSelectors = document.querySelectorAll('.child-age-selector');
                        const childrenAges = Array.from(ageSelectors).map(s => s.value);

                        if (!checkinVal || !checkoutVal || !phoneVal) {
                            alert("Vui lòng điền đầy đủ thông tin (ngày và số điện thoại).");
                            return;
                        }
                        if (childCount > 0 && childrenAges.some(age => !age)) {
                            alert("Vui lòng chọn đầy đủ độ tuổi của trẻ em.");
                            return;
                        }

                        const childrenAgeStr = childrenAges.join(',');

                        const parseLocal = (dateStr) => {
                            const [y, m, d] = dateStr.split('-');
                            return new Date(y, m - 1, d);
                        };

                        const checkinDateObj = parseLocal(checkinVal);
                        const checkoutDateObj = parseLocal(checkoutVal);
                        const diffTime = checkoutDateObj - checkinDateObj;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                        if (diffDays <= 0) {
                            alert("Ngày trả phòng phải sau ngày nhận phòng.");
                            return;
                        }

                        // --- 1-NIGHT POLICY SYNC (v11.14) ---
                        if (diffDays === 1) {
                            const nowAtLat = new Date();
                            const currentMonthId = nowAtLat.getMonth() + 1;
                            const currentYear = nowAtLat.getFullYear();
                            const checkinMonth = checkinDateObj.getMonth() + 1;
                            const checkinYear = checkinDateObj.getFullYear();
                            
                            const isCurrentMonth = (checkinMonth === currentMonthId) && (checkinYear === currentYear);
                            
                            // 1. Current Month: Always allow redirection (rooms.html handles gaps)
                            if (isCurrentMonth) {
                                console.log("[v11.16] Current Month Stay - Proceeding to rooms.html");
                                // Proceed immediately
                            } 
                            // 2. Other Months: Check Policy API
                            else {
                                if (isCheckingPolicy) return;
                                isCheckingPolicy = true;

                                try {
                                    const policyDataRaw = await fetchJSONP(POLICY_API + "&t=" + Date.now());
                                    let dynamicPolicy = [];
                                    if (policyDataRaw && policyDataRaw.table && policyDataRaw.table.rows) {
                                        dynamicPolicy = policyDataRaw.table.rows.map(row => ({
                                            Month_ID: row.c[0] ? row.c[0].v : null,
                                            Min_Days_Lead: row.c[1] ? row.c[1].v : null
                                        })).filter(p => p.Month_ID !== null);
                                    }

                                    const STATIC_POLICY = { 1: 5, 2: 5, 3: 4, 4: 7, 5: 7, 6: 5, 7: 5, 8: 5, 9: 7, 10: 7, 11: 7, 12: 5 };
                                    const today = new Date(); today.setHours(0, 0, 0, 0);
                                    const daysLead = Math.ceil((checkinDateObj - today) / (1000 * 60 * 60 * 24));
                                    let minDaysLead = (dynamicPolicy.find(p => p.Month_ID === checkinMonth))?.Min_Days_Lead || STATIC_POLICY[checkinMonth] || 7;

                                    if (daysLead > minDaysLead) {
                                        triggerWarningEffect();
                                        isCheckingPolicy = false;
                                        return;
                                    }
                                } catch (err) {
                                    console.error("Policy check error", err);
                                    // On error for non-current month, safer to show warning
                                    triggerWarningEffect();
                                    isCheckingPolicy = false;
                                    return;
                                } finally {
                                    isCheckingPolicy = false;
                                }
                            }
                        }

                        const bookingData = {
                            checkin: checkinVal,
                            checkout: checkoutVal,
                            adults: adultCount,
                            children: childCount,
                            childrenAgeCategory: childrenAgeStr,
                            phone: phoneVal
                        };
                        sessionStorage.setItem('chonVillageBooking', JSON.stringify(bookingData));
                        window.location.href = "rooms.html";
                    });
                }
            } catch (globalErr) {
                console.error("CRITICAL: index.html script execution failure", globalErr);
            }
        });
    </script>
